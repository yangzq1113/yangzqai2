name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-debug-apk:
    if: github.repository == 'funnycups/Luker'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install runtime dependencies
        run: npm ci --omit=dev

      - name: Fetch Node.js Mobile Android runtime
        run: node android-app/scripts/fetch-nodejs-mobile.mjs

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: gradle -p android-app :app:assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: luker-android-debug-apk
          path: android-app/app/build/outputs/apk/debug/*.apk

  build-release-apk:
    if: github.repository == 'funnycups/Luker' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - build-debug-apk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install runtime dependencies
        run: npm ci --omit=dev

      - name: Fetch Node.js Mobile Android runtime
        run: node android-app/scripts/fetch-nodejs-mobile.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android-app/release.keystore

      - name: Build signed release APK
        run: gradle -p android-app :app:assembleRelease
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/android-app/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: luker-android-release-apk
          path: android-app/app/build/outputs/apk/release/*.apk

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android-app/app/build/outputs/apk/release/*.apk
