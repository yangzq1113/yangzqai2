# SPDX-License-Identifier: AGPL-3.0-or-later
# Adapted for forked repositories from Luker (https://github.com/funnycups/Luker)

# This workflow builds and publishes Docker images to GitHub Container Registry (ghcr.io).
# It supports multi-arch builds (amd64 and arm64).

name: Create Docker Image (Release and Staging)

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    tags:
      - '*'

permissions:
  contents: read
  packages: write

env:
  # Uses the current repository name and ghcr.io registry
  REPO: ${{ github.repository }}
  REGISTRY: ghcr.io

jobs:
  prepare:
    # Removed the original 'if: github.repository == ...' check to allow building in forks
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      tags: ${{ steps.metadata.outputs.tags }}
      labels: ${{ steps.metadata.outputs.labels }}
    steps:
      - name: Set lowercase repo name
        id: image
        # Converts repo name to lowercase for Docker registry compatibility
        run: echo "image=${{ env.REGISTRY }}/${REPO,,}" >> "${GITHUB_OUTPUT}"

      - name: Extract metadata (tags, labels) for the image
        uses: docker/metadata-action@v5.5.1
        id: metadata
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            # Tag as 'dev' for non-tag pushes
            type=raw,value=dev,enable=${{ !startsWith(github.ref, 'refs/tags/') }}
            # Short commit SHA tag
            type=sha,format=short
            # Actual tag name (e.g., v1.0.0)
            type=ref,event=tag
            # Tag as 'latest' only for stable releases (no '-' in tag name)
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-') }}
            # Manual trigger tag
            type=raw,value=manual,enable=${{ github.event_name == 'workflow_dispatch' }}

  build-amd64:
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push linux/amd64 by digest
        id: build
        uses: docker/build-push-action@v5.3.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          labels: ${{ needs.prepare.outputs.labels }}
          # Push by digest first for multi-arch manifest creation later
          outputs: type=image,name=${{ needs.prepare.outputs.image }},push-by-digest=true,name-canonical=true,push=true

  build-arm64:
    needs: prepare
    # Note: ubuntu-24.04-arm is a GitHub-hosted runner for ARM64. 
    # It is available for public repositories. If your repository is private, you might need to use QEMU.
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push linux/arm64 by digest
        id: build
        uses: docker/build-push-action@v5.3.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          labels: ${{ needs.prepare.outputs.labels }}
          outputs: type=image,name=${{ needs.prepare.outputs.image }},push-by-digest=true,name-canonical=true,push=true

  publish-manifest:
    needs:
      - prepare
      - build-amd64
      - build-arm64
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-arch manifests
        env:
          IMAGE: ${{ needs.prepare.outputs.image }}
          TAGS: ${{ needs.prepare.outputs.tags }}
          DIGEST_AMD64: ${{ needs.build-amd64.outputs.digest }}
          DIGEST_ARM64: ${{ needs.build-arm64.outputs.digest }}
        run: |
          set -euo pipefail
          for tag in ${TAGS}; do
            docker buildx imagetools create \
              -t "${tag}" \
              "${IMAGE}@${DIGEST_AMD64}" \
              "${IMAGE}@${DIGEST_ARM64}"
          done
